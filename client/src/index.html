<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Voltix EMS</title>
  <base href="/">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          backgroundImage: {
            'os-bg': "linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 50%, #fae8ff 100%)",
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: #fdf2f8; overflow: hidden; }
    .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid white; border-radius: 3.5rem; }
    .page-container { animation: slideUp 0.6s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-os-bg">
  <app-root></app-root>
</body>
</html>
