<div class="w-full h-full p-8 overflow-y-auto bg-gradient-to-br from-slate-50 via-white to-slate-50">

  <!-- Header -->
  <div class="relative mb-12">
    <div class="absolute inset-0 bg-gradient-to-r from-blue-600/10 to-purple-600/10 rounded-3xl blur-3xl"></div>
    <div class="relative text-center">
      <div class="relative inline-block">
        <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-purple-600 rounded-3xl blur-xl opacity-50"></div>
        <div class="relative w-28 h-28 rounded-3xl bg-gradient-to-br from-blue-500 to-purple-600 shadow-2xl mb-6 flex items-center justify-center transform transition-transform hover:scale-105 duration-300">
          <span class="text-5xl text-white font-black">{{ currentUser.username.charAt(0).toUpperCase() || 'U' }}</span>
        </div>
        <div class="absolute -bottom-2 -right-2 w-6 h-6 bg-green-500 rounded-full border-4 border-white shadow-lg"></div>
      </div>
      <h1 class="text-5xl font-black bg-gradient-to-r from-slate-900 to-slate-700 bg-clip-text text-transparent mb-3">Mon Profil</h1>
      <p class="text-sm text-slate-500 font-medium">Gérez vos informations personnelles et sécurisez votre compte</p>
    </div>
  </div>

  <div class="max-w-3xl mx-auto">

    <!-- Messages -->
    <div *ngIf="successMessage()" class="mb-6 p-4 bg-emerald-50 border-l-4 border-emerald-500 rounded-xl">
      <div class="flex items-center gap-3">
        <span class="text-xl">✅</span>
        <p class="text-emerald-700 text-sm font-semibold">{{ successMessage() }}</p>
      </div>
    </div>

    <div *ngIf="errorMessage()" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-xl">
      <div class="flex items-center gap-3">
        <span class="text-xl">❌</span>
        <p class="text-red-700 text-sm font-semibold">{{ errorMessage() }}</p>
      </div>
    </div>

    <!-- Formulaire Profil + Mot de passe -->
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden mb-8">

      <div class="border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white px-8 py-5">
        <div class="flex items-center gap-3">
          <span class="text-xl">📝</span>
          <h2 class="text-lg font-bold text-slate-800">Informations générales</h2>
        </div>
        <p class="text-[10px] text-slate-400 mt-1">Modifiez vos informations personnelles</p>
      </div>

      <form (ngSubmit)="updateProfile()" class="p-8 space-y-6">

        <!-- Nom d'utilisateur -->
        <div class="group">
          <label class="text-[11px] font-black text-slate-500 uppercase tracking-wider block mb-2 group-focus-within:text-blue-600 transition-colors">
            <span class="mr-2">👤</span> Nom d'utilisateur
          </label>
          <input type="text" [(ngModel)]="currentUser.username" name="username"
            class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none transition-all font-medium text-slate-800">
        </div>

        <!-- Email -->
        <div class="group">
          <label class="text-[11px] font-black text-slate-500 uppercase tracking-wider block mb-2 group-focus-within:text-blue-600 transition-colors">
            <span class="mr-2">✉️</span> Adresse email
          </label>
          <input type="email" [(ngModel)]="currentUser.email" name="email"
            class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none transition-all font-medium text-slate-800">
        </div>

        <!-- Rôle -->
        <div class="group">
          <label class="text-[11px] font-black text-slate-500 uppercase tracking-wider block mb-2">
            <span class="mr-2">🎖️</span> Rôle
          </label>
          <div class="relative">
            <input type="text" [value]="getRoleLabel(currentUser.role)" disabled
              class="w-full px-5 py-4 bg-slate-100 border-2 border-slate-200 rounded-2xl text-slate-600 font-medium cursor-not-allowed">
            <div class="absolute right-5 top-1/2 -translate-y-1/2">
              <span class="text-sm" *ngIf="currentUser.role === 'ADMIN'">👑</span>
              <span class="text-sm" *ngIf="currentUser.role === 'RESPONSABLE_ENERGIE'">⚡</span>
              <span class="text-sm" *ngIf="currentUser.role === 'UTILISATEUR'">👤</span>
            </div>
          </div>
        </div>

        <!-- Nouveau mot de passe -->
        <div class="group">
          <label class="text-[11px] font-black text-slate-500 uppercase tracking-wider block mb-2">
            <span class="mr-2">🔑</span> Nouveau mot de passe
          </label>
          <div class="relative">
            <input [type]="showNewPassword() ? 'text' : 'password'" [(ngModel)]="newPassword" name="newPassword"
              placeholder="Entrez votre nouveau mot de passe"
              class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none transition-all font-medium pr-12">
            <button type="button" (click)="toggleNewPasswordVisibility()" 
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition-colors text-xl">
              {{ showNewPassword() ? '🙈' : '👁️' }}
            </button>
          </div>
          <p class="text-[9px] text-slate-400 mt-2">Minimum 6 caractères</p>
        </div>

        <!-- Confirmer mot de passe -->
        <div class="group">
          <label class="text-[11px] font-black text-slate-500 uppercase tracking-wider block mb-2">
            <span class="mr-2">✅</span> Confirmer le mot de passe
          </label>
          <div class="relative">
            <input [type]="showConfirmPassword() ? 'text' : 'password'" [(ngModel)]="confirmPassword" name="confirmPassword"
              placeholder="Confirmez votre nouveau mot de passe"
              class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none transition-all font-medium pr-12">
            <button type="button" (click)="toggleConfirmPasswordVisibility()" 
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition-colors text-xl">
              {{ showConfirmPassword() ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <!-- Bouton Mettre à jour -->
        <button type="submit" [disabled]="isLoading()"
          class="w-full py-4 rounded-2xl bg-gradient-to-r from-[#0ea5e9] to-[#3dd5f3] text-white font-bold text-sm uppercase tracking-wider hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="!isLoading()" class="flex items-center justify-center gap-2">
            <span>💾</span>
            Mettre à jour mon profil
          </span>
          <span *ngIf="isLoading()" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Mise à jour...
          </span>
        </button>

      </form>
    </div>
  </div>
</div>
