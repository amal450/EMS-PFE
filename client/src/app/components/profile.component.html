<div class="max-w-3xl mx-auto bg-white p-20 rounded-[5rem] shadow-2xl mt-16 animate-in slide-in-from-bottom duration-1000 border border-slate-50">
  <div class="text-center mb-16">
    <div class="w-24 h-24 bg-gradient-to-tr from-slate-900 to-slate-700 rounded-[2.5rem] mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black shadow-2xl shadow-slate-200">
        {{currentUser.username[0].toUpperCase()}}
    </div>
    <h2 class="text-6xl font-black tracking-tighter text-slate-900 italic">Paramètres</h2>
    <p class="text-slate-300 font-bold uppercase text-[10px] tracking-[0.4em] mt-2">Gestion de l'identité système</p>
  </div>

  <div class="space-y-10">
    <div class="group">
      <label class="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4 block group-focus-within:text-rose-600 transition-colors ml-4">Nom d'utilisateur</label>
      <input [(ngModel)]="currentUser.username" 
             class="w-full bg-slate-50 border-none p-7 rounded-[2.5rem] text-2xl font-black text-slate-800 outline-none focus:ring-8 ring-slate-100 transition-all shadow-inner">
    </div>

    <div class="group">
      <label class="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4 block group-focus-within:text-rose-600 transition-colors ml-4">Email de contact</label>
      <input [(ngModel)]="currentUser.email" 
             class="w-full bg-slate-50 border-none p-7 rounded-[2.5rem] text-2xl font-black text-slate-800 outline-none focus:ring-8 ring-slate-100 transition-all shadow-inner">
    </div>

    <div class="pt-10">
      <button (click)="updateProfile()" 
              class="w-full bg-slate-900 text-white py-8 rounded-[3rem] font-black text-xs uppercase tracking-[0.5em] shadow-2xl hover:bg-rose-600 hover:scale-[1.03] active:scale-95 transition-all">
        Mettre à jour le profil
      </button>
    </div>
  </div>
</div>
