<!-- J'ai ajouté overflow-hidden pour empêcher tout scroll -->
<div class="parallax-container h-screen w-full bg-white flex flex-col font-sans selection:bg-sky-100 overflow-hidden">

  <!-- L'ancien HEADER a été supprimé comme demandé -->

  <!-- MAIN -->
  <main class="flex-1 relative flex flex-col h-full">

    <!-- Background (Rendu totalement fixe) -->
    <div class="absolute inset-0 z-0">
      <!-- J'ai supprimé la classe parallax-bg pour éviter les mouvements/scrolls -->
      <img src="assets/industrial-bg.png" alt="background" class="w-full h-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-r from-slate-900/95 via-slate-900/60 to-transparent"></div>
    </div>

    <!-- LOGO DÉPLACÉ ICI (En haut à gauche, au-dessus du fond sombre) -->
    <div class="absolute top-6 left-6 lg:top-10 lg:left-12 z-50 flex items-center gap-3">
      <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center shadow-lg">
        <span class="text-white text-xl">⚡</span>
      </div>
      <div>
        <!-- Le texte est passé en blanc (text-white) et gris clair (text-slate-300) pour être visible sur le fond sombre -->
        <h1 class="text-xl font-black text-white tracking-tight leading-none uppercase">EMS</h1>
        <p class="text-[8px] font-bold text-slate-300 uppercase tracking-[0.2em]">Energy System</p>
      </div>
    </div>

    <!-- Contenu principal -->
    <div class="relative z-10 flex-1 flex flex-col lg:flex-row items-center px-8 lg:px-24 py-12 lg:py-0 w-full h-full">

      <!-- LEFT TEXT -->
      <div class="flex-1 text-white space-y-8 mb-12 lg:mb-0 lg:pr-12 mt-16 lg:mt-0">
        <div class="inline-flex items-center gap-2 px-4 py-2 bg-sky-500/20 backdrop-blur-md border border-sky-500/30 rounded-full text-sky-400 text-xs font-bold uppercase tracking-widest">
          <span class="flex h-2 w-2 rounded-full bg-sky-400 animate-pulse"></span>
          Monitoring Industriel 4.0
        </div>

        <h2 class="text-5xl lg:text-7xl font-black tracking-tight leading-[1.1]">
          Optimisez votre
          <br>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-pink-500">
            Énergie
          </span>
          en temps réel.
        </h2>

        <p class="text-lg text-slate-300 max-w-xl leading-relaxed">
          Connectez-vous à la plateforme EMS la plus avancée. Visualisez, analysez et contrôlez vos actifs industriels en un clic.
        </p>
      </div>

      <!-- CARD -->
      <div class="w-full max-w-[480px]">
        <div class="glass-card p-10 lg:p-12">

          <div class="mb-10">
            <h3 class="text-2xl font-black text-slate-900 tracking-tight">Accès Client</h3>
            <p class="text-slate-500 text-sm mt-2">Veuillez entrer vos identifiants pour continuer.</p>
          </div>

          <!-- FORM -->
          <form (ngSubmit)="login()" class="space-y-6">
            <div class="space-y-2">
              <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Email </label>
              <input
                type="email"
                [(ngModel)]="email"
                name="email"
                placeholder="email@ems-system.com"
                class="input-premium"
              />
            </div>

            <div class="space-y-2">
              <div class="flex justify-between items-center px-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mot de passe</label>
              </div>
              <input
                type="password"
                [(ngModel)]="password"
                name="password"
                placeholder="••••••••"
                class="input-premium"
              />
            </div>

            <!-- Affichage erreur -->
            <div *ngIf="errorMessage()" class="error-box text-red-500 text-xs flex items-center gap-1">
              <span></span> {{ errorMessage() }}
            </div>

            <!-- Bouton connexion -->
            <button
              type="submit"
              [disabled]="isLoading()"
              class="submit-btn w-full flex justify-center items-center gap-2"
            >
              <span *ngIf="!isLoading()">Se connecter au Dashboard →</span>
              <div *ngIf="isLoading()" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
          </form>

        </div>
      </div>
    </div>
  </main>

</div>
