<aside class="w-[280px] bg-white h-[calc(100vh-2rem)] rounded-3xl flex flex-col p-6 shadow-lg border border-slate-100 overflow-hidden ml-4 my-4 font-sans">

  <h1 class="text-lg font-black text-blue-600 mb-8">EMS ENERGY</h1>
  <div 
  (click)="navigateTo('profile')" 
  class="flex items-center gap-3 mb-8 p-3 rounded-xl hover:bg-slate-100 cursor-pointer"
>
  <div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold">
    A
  </div>

  <div>
    <p class="text-sm font-bold text-slate-700">Amal</p>
    <p class="text-[10px] text-slate-500 uppercase">Admin</p>
  </div>
</div>

  <nav class="mb-8 space-y-2">
    <button (click)="navigateTo('dashboard')" class="w-full text-left p-3 text-[11px] font-bold text-slate-600 hover:bg-blue-50 rounded-xl uppercase">
      📊 Dashboard
    </button>

    <button *ngIf="authService.isAdmin()"
        (click)="navigateTo('users')"
        class="w-full text-left p-3 text-[11px] font-bold text-slate-600 hover:bg-blue-50 rounded-xl uppercase">
        👥 Gestion Utilisateurs
    </button>
  </nav>

  <div class="flex-1 overflow-y-auto">

    <div class="flex justify-between items-center mb-4 px-2">
      <h3 class="text-[9px] font-black text-slate-400 uppercase">Hiérarchie</h3>
      <button *ngIf="authService.isAdmin()"
        (click)="openAdd({id:null}, 'SITE')"
        class="text-blue-600 font-black">
  +
</button>
    </div>

    <div *ngFor="let site of hierarchy()">

      <!-- SITE -->
      <div class="group flex items-center justify-between p-2 rounded-lg hover:bg-slate-100 cursor-pointer">
        <span (click)="selectAsset(site)" class="font-bold text-[10px] text-slate-700">🏢 {{ site.name }}</span>

        <div *ngIf="authService.isAdmin()" class="hidden group-hover:flex gap-1">
          <button (click)="openAdd(site,'TABLEAU')" class="text-blue-500">➕</button>
          <button (click)="openEdit(site)" class="text-amber-500">✏️</button>
          <button (click)="askDelete(site.id)" class="text-red-500">🗑️</button>
        </div>
      </div>

      <!-- TGBT -->
      <div class="pl-4 border-l border-slate-200 space-y-2" *ngFor="let tgbt of site.children">

        <div class="group flex items-center justify-between p-2 rounded-lg hover:bg-slate-50 cursor-pointer">
          <span (click)="selectAsset(tgbt)" class="text-[10px] font-semibold text-slate-600">⚡ {{ tgbt.name }}</span>

          <div *ngIf="authService.isAdmin()" class="hidden group-hover:flex gap-1">
            <button (click)="openAdd(tgbt,'ARMOIRE')" class="text-blue-500">➕</button>
            <button (click)="openEdit(tgbt)" class="text-amber-500">✏️</button>
            <button (click)="askDelete(tgbt.id)" class="text-red-500">🗑️</button>
          </div>
        </div>

        <!-- ARMOIRE -->
        <div class="pl-4 border-l border-slate-200 space-y-2" *ngFor="let arm of tgbt.children">

          <div class="group flex items-center justify-between p-2 rounded-lg hover:bg-slate-50 cursor-pointer">
            <span (click)="selectAsset(arm)" class="text-[9px] font-semibold text-slate-600">📦 {{ arm.name }}</span>

            <div *ngIf="authService.isAdmin()" class="hidden group-hover:flex gap-1">
              <button (click)="openAdd(arm,'LIGNE')" class="text-blue-500">➕</button>
              <button (click)="openEdit(arm)" class="text-amber-500">✏️</button>
              <button (click)="askDelete(arm.id)" class="text-red-500">🗑️</button>
            </div>
          </div>

          <!-- LIGNE -->
          <div class="pl-4 border-l border-slate-200 space-y-2" *ngFor="let ligne of arm.children">

            <div class="group flex items-center justify-between p-2 rounded-lg hover:bg-slate-50 cursor-pointer">
              <span (click)="selectAsset(ligne)" class="text-[9px] font-semibold text-slate-600">🔌 {{ ligne.name }}</span>

              <div *ngIf="authService.isAdmin()" class="hidden group-hover:flex gap-1">
                <button (click)="openAdd(ligne,'EQUIPEMENT')" class="text-blue-500">➕</button>
                <button (click)="openEdit(ligne)" class="text-amber-500">✏️</button>
                <button (click)="askDelete(ligne.id)" class="text-red-500">🗑️</button>
              </div>
            </div>

            <!-- EQUIPEMENT -->
            <div class="pl-4 space-y-1" *ngFor="let eq of ligne.children">

              <div class="group flex items-center justify-between p-2 rounded-lg hover:bg-indigo-50 cursor-pointer">
                <span (click)="selectAsset(eq)" class="text-[8px] font-semibold text-slate-700 uppercase">⚙️ {{ eq.name }}</span>

                <div *ngIf="authService.isAdmin()" class="hidden group-hover:flex gap-1">
                  <button (click)="openEdit(eq)" class="text-amber-500">✏️</button>
                  <button (click)="askDelete(eq.id)" class="text-red-500">🗑️</button>
                </div>
              </div>

            </div>

          </div>

        </div>

      </div>

    </div>
  </div>

  <!-- Modal Ajouter/Modifier -->
  <div *ngIf="showAssetModal()" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white text-black p-6 rounded w-96">
      <h2 class="text-lg font-bold mb-4">
        {{ isEditAssetMode() ? 'Modifier' : 'Ajouter' }} Asset
      </h2>

      <label class="block mb-2">Nom:</label>
      <input type="text" [(ngModel)]="assetForm().name" class="border p-2 w-full mb-4" />

      <label class="block mb-2">Type:</label>
      <input type="text" [(ngModel)]="assetForm().type" class="border p-2 w-full mb-4" />

      <div class="flex justify-end gap-2">
        <button (click)="showAssetModal.set(false)" class="bg-gray-400 p-2 rounded hover:bg-gray-500">Annuler</button>
        <button (click)="saveAsset()" class="bg-blue-600 p-2 rounded hover:bg-blue-700 text-white">
          {{ isEditAssetMode() ? 'Modifier' : 'Ajouter' }}
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Supprimer -->
  <div *ngIf="showDeleteAssetModal()" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white p-8 rounded-3xl w-80 shadow-2xl text-center">
      <h2 class="text-lg font-black text-red-600 mb-4">Attention</h2>
      <p class="text-sm mb-6">Êtes-vous sûr de vouloir supprimer cet élément ?</p>
      <div class="flex gap-2">
        <button (click)="confirmDelete()" class="flex-1 bg-red-600 text-white py-2 rounded-xl font-bold">Oui</button>
        <button (click)="showDeleteAssetModal.set(false)" class="flex-1 bg-gray-200 py-2 rounded-xl font-bold">Non</button>
      </div>
    </div>
  </div>

  <button (click)="logout()" class="mt-auto p-3 bg-slate-900 text-white rounded-xl text-xs font-bold">Déconnexion</button>

</aside>
