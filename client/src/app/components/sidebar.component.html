<aside class="w-[360px] bg-[#0b1320] h-screen flex flex-col shadow-2xl overflow-hidden font-sans text-white border-r border-slate-800">

  <style>
    /* Cacher complètement la scrollbar tout en gardant le scroll actif */
    .custom-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .custom-scrollbar {
      -ms-overflow-style: none;  /* IE 10+ */
      scrollbar-width: none;      /* Firefox */
    }
  </style>

  <!-- Logo EMS + Texte sur la même ligne -->
  <div class="pt-12 px-6 pb-6 flex items-center gap-4">
    <div class="w-14 h-14 rounded-xl bg-[#0ea5e9] flex items-center justify-center text-white text-2xl shadow-lg shadow-[#0ea5e9]/30">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
        <path d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"></path>
      </svg>
    </div>
    <div class="flex flex-col">
      <h1 class="text-2xl font-bold leading-snug">EMS</h1>
      <p class="text-[12px] text-slate-400 tracking-widest font-semibold uppercase mt-0.5">Energy System</p>
    </div>
  </div>

  <!-- Menu Navigation -->
  <nav class="px-4 space-y-2 mt-6 mb-10 text-base">
    <button (click)="setActive('overview'); navigateTo('dashboard')"
            [ngClass]="activeButton === 'overview' ? 'bg-[#0ea5e9] text-white shadow-lg shadow-[#0ea5e9]/20' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
        </path>
      </svg>
      Overview
    </button>

    <!-- NOUVEAU BOUTON HIÉRARCHIE -->
    <button (click)="setActive('hierarchy'); navigateTo('hierarchy')"
            [ngClass]="activeButton === 'hierarchy' ? 'bg-[#0ea5e9] text-white shadow-lg shadow-[#0ea5e9]/20' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 12h2l2 5 3-8 3 8 2-5h2M5 21h14M4 3h16M4 7h16"/>
      </svg>
      Hiérarchie
    </button>

    <button *ngIf="authService.isAdmin()" (click)="setActive('users'); navigateTo('users')"
            [ngClass]="activeButton === 'users' ? 'bg-[#0ea5e9] text-white shadow-lg shadow-[#0ea5e9]/20' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-all">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
        </path>
      </svg>
      Users Management
    </button>
  </nav>

  <!-- Section vide - La hiérarchie est maintenant dans le dashboard -->
  <div class="flex-1"></div>

  <!-- Bouton Déconnexion -->
  <div class="p-6">
    <button (click)="showLogoutModal.set(true)"
            class="w-full flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl text-sm font-semibold transition-all">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
        </path>
      </svg>
      Déconnexion
    </button>
  </div>

  <!-- Modal Déconnexion -->
  <div *ngIf="showLogoutModal()" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm">
    <div class="bg-white p-8 rounded-3xl w-80 shadow-2xl text-center">
      <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-blue-100 mb-4">
        <svg class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </div>

      <h2 class="text-xl font-bold text-slate-900 mb-2">Déconnexion</h2>
      <p class="text-sm text-slate-500 mb-8">Voulez-vous vraiment vous déconnecter ?</p>

      <div class="flex gap-3">
        <button (click)="showLogoutModal.set(false)"
                class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">
          Annuler
        </button>

        <button (click)="confirmLogout()"
                class="flex-1 bg-blue-500 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition-colors shadow-lg shadow-blue-500/30">
          Oui
        </button>
      </div>
    </div>
  </div>

</aside>
