<div class="flex h-screen p-4 gap-6 overflow-hidden">
  
  <!-- SIDEBAR (Bida) -->
  <app-sidebar class="h-full z-20"></app-sidebar>

  <div class="flex-1 flex flex-col gap-6 overflow-hidden">
    
    <!-- TOP NAV BAR (Horizontal Pill - Capture 3) -->
    <header class="h-20 bg-white/60 backdrop-blur-md border border-white rounded-[2.5rem] flex items-center justify-between px-10 shadow-sm animate-in fade-in duration-700">
      <nav class="flex gap-12 items-center">
        <div (click)="navigate('dashboard')" class="flex items-center gap-3 cursor-pointer group transition-all hover:scale-105">
          <span class="text-rose-600 font-bold">📊</span>
          <span class="text-[10px] font-black tracking-[0.2em] text-slate-400 group-hover:text-rose-600 uppercase">Dashboard</span>
        </div>
        <div (click)="navigate('alertes')" class="flex items-center gap-3 cursor-pointer group transition-all hover:scale-105">
          <span class="text-slate-400">⚠️</span>
          <span class="text-[10px] font-black tracking-[0.2em] text-slate-400 uppercase">Alertes</span>
        </div>
        <div (click)="navigate('users')" class="flex items-center gap-3 cursor-pointer group transition-all hover:scale-105">
          <span class="text-slate-400">👥</span>
          <span class="text-[10px] font-black tracking-[0.2em] text-slate-400 uppercase">Utilisateurs</span>
        </div>
      </nav>

      <!-- Profil & Admin Info -->
      <div (click)="navigate('profile')" class="flex items-center gap-4 cursor-pointer hover:opacity-80 transition-all">
        <div class="text-right">
          <p class="text-xs font-black text-slate-800 leading-none">Amal Dawed</p>
          <p class="text-[9px] font-bold text-rose-500 uppercase mt-1">Adminstrateur</p>
        </div>
        <div class="w-12 h-12 rounded-2xl bg-slate-900 flex items-center justify-center text-white font-bold shadow-lg">A</div>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <main class="flex-1 overflow-y-auto scrollbar-hide page-container">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
