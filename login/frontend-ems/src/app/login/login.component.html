<div style="background-color: #0b0e14; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif;">
  <div style="background-color: #161b22; padding: 40px; border-radius: 15px; width: 350px; text-align: center; border: 1px solid #30363d;">
    <h2 style="margin-bottom: 20px;">E | <span style="color: #e91e63;">Admin</span></h2>
    <p style="font-size: 12px; color: #8b949e; margin-bottom: 20px;">CONNEXION AU SYSTÈME</p>
    
    <input type="email" [(ngModel)]="email" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #0b0e14; border: 1px solid #30363d; color: white; border-radius: 5px;">
    
    <input type="password" [(ngModel)]="password" placeholder="Mot de passe" style="width: 100%; padding: 12px; margin-bottom: 25px; background: #0b0e14; border: 1px solid #30363d; color: white; border-radius: 5px;">
    
    <button (click)="connecter()" style="width: 100%; padding: 12px; background-color: #e91e63; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">SE CONNECTER</button>
    
    <p *ngIf="erreur" style="color: red; font-size: 12px; mt-3">{{erreur}}</p>
  </div>
</div>
